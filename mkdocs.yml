site_name: data-analytics
site_description: Column-wise statistics and helpers for pandas DataFrames.
edit_uri: https://github.com/ldirer/pycon-workshop-data-analytics/edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - API reference: api.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

strict: true
